<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordenadoria - Análise de Evasão</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <div class="max-w-5xl mx-auto py-10 px-4">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-blue-800">Coordenação de Curso IFFar</h1>
            <h2 class="text-2xl font-semibold text-gray-900 mt-1">Relatório de Evasão Consolidado</h2>
            <p class="text-gray-600 mt-2">Upload de diários de classe para análise de faltas por aluno.</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mês de Análise</label>
                    <select id="mes_analise" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border text-black">
                        <option value="Janeiro">Janeiro</option>
                        <option value="Fevereiro">Fevereiro</option>
                        <option value="Março" selected>Março</option>
                        <option value="Abril">Abril</option>
                        <option value="Maio">Maio</option>
                        <option value="Junho">Junho</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Selecionar PDFs</label>
                    <input type="file" id="arquivos" multiple accept=".pdf"
                        class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-blue-50 file:text-blue-700">
                </div>

                <button onclick="processarPDFs()" id="btn-processar"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg">
                    Processar Relatório
                </button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
        </div>

        <!-- CARDS -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-md p-6">
                <p class="text-sm text-gray-500 uppercase">Total de alunos faltantes</p>
                <p id="card-total-alunos" class="mt-3 text-4xl font-bold text-blue-700">0</p>
            </div>

            <div class="bg-white rounded-xl shadow-md p-6 lg:col-span-2">
                <div class="flex justify-between mb-4">
                    <p class="text-sm text-gray-500 uppercase">Disciplinas × total de alunos</p>
                    <div class="flex gap-3">
                        <span id="resumo-disciplinas-qtd" class="text-xs text-gray-400">0</span>
                        <button onclick="limparFiltro()" class="text-xs text-blue-600 hover:underline">
                            Limpar filtro
                        </button>
                    </div>
                </div>
                <div id="card-disciplinas"></div>
            </div>
        </div>

        <!-- TABELA -->
        <div class="bg-white rounded-xl shadow-md">
            <div class="p-4 border-b flex justify-between">
                <h2 class="font-bold">Alunos com evasão</h2>
                <span id="label-mes" class="text-xs bg-blue-100 px-2 rounded">Março</span>
            </div>

            <div class="p-4">
                <input id="busca_geral" oninput="filtrarTabela()" placeholder="Buscar..."
                    class="w-full border p-2 rounded">
            </div>

            <table class="min-w-full text-sm">
                <thead>
                    <tr>
                        <th onclick="ordenarPorNome()" class="cursor-pointer px-4 py-2">Nome ⬍</th>
                        <th class="px-4 py-2">Matrícula</th>
                        <th class="px-4 py-2">Disciplina</th>
                        <th onclick="ordenarPorFaltas()" class="cursor-pointer px-4 py-2 text-center">Faltas ⬍</th>
                        <th class="px-4 py-2">Datas</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>

        <div id="vazio" class="hidden text-center py-10 text-gray-500">
            Nenhum resultado encontrado
        </div>
    </div>

<script>
const API_URL = "https://conta-faltas.vercel.app";

let dadosTabela = [];
let ordemDesc = true;
let colunaOrdenacao = 'faltas';

// ===== API =====
async function processarPDFs() {
    const files = document.getElementById('arquivos').files;
    const mes = document.getElementById('mes_analise').value;

    const formData = new FormData();
    formData.append('mes', mes);

    for (let f of files) formData.append('arquivos', f);

    const res = await fetch(`${API_URL}/analyze`, {
        method: 'POST',
        body: formData
    });

    const data = await res.json();
    dadosTabela = data || [];

    document.getElementById('label-mes').innerText = mes;

    filtrarTabela();
}

// ===== FILTRO + ORDENAÇÃO =====
function filtrarTabela() {
    const termo = document.getElementById('busca_geral').value.toLowerCase();

    let dados = dadosTabela.filter(a =>
        (a.Nome || '').toLowerCase().includes(termo) ||
        (a.Disciplina || '').toLowerCase().includes(termo)
    );

    if (colunaOrdenacao === 'faltas') {
        dados.sort((a,b) => {
            const diff = b['Total Faltas (Mês)'] - a['Total Faltas (Mês)'];
            return ordemDesc ? diff : -diff;
        });
    } else {
        dados.sort((a,b) => {
            const diff = a.Nome.localeCompare(b.Nome, 'pt-BR');
            return ordemDesc ? -diff : diff;
        });
    }

    renderizarTabela(dados);
    atualizarCardsResumo(dados);

    document.getElementById('vazio').classList.toggle('hidden', dados.length > 0);
}

// ===== ORDENAÇÃO =====
function ordenarPorFaltas() {
    colunaOrdenacao = 'faltas';
    ordemDesc = !ordemDesc;
    filtrarTabela();
}

function ordenarPorNome() {
    colunaOrdenacao = 'nome';
    ordemDesc = !ordemDesc;
    filtrarTabela();
}

// ===== TABELA =====
function renderizarTabela(data) {
    const corpo = document.getElementById('tabela-corpo');
    corpo.innerHTML = '';

    data.forEach(a => {
        corpo.innerHTML += `
        <tr>
            <td class="px-4 py-2">${a.Nome}</td>
            <td class="px-4 py-2">${a.Matrícula}</td>
            <td class="px-4 py-2">${a.Disciplina}</td>
            <td class="px-4 py-2 text-center text-red-600 font-bold">${a['Total Faltas (Mês)']}</td>
            <td class="px-4 py-2">${a['Datas das Faltas']}</td>
        </tr>`;
    });
}

// ===== CARDS =====
function atualizarCardsResumo(data) {
    document.getElementById('card-total-alunos').innerText = data.length;

    const map = {};
    data.forEach(a => {
        map[a.Disciplina] = (map[a.Disciplina] || 0) + 1;
    });

    const lista = Object.entries(map).sort((a,b)=>b[1]-a[1]);

    document.getElementById('resumo-disciplinas-qtd').innerText = lista.length;

    document.getElementById('card-disciplinas').innerHTML = lista.map(([d,t])=>`
        <div onclick="filtrarPorDisciplina('${d}')"
            class="flex justify-between border p-2 rounded cursor-pointer hover:bg-blue-50">
            <span>${d}</span>
            <span class="font-bold text-blue-700">${t}</span>
        </div>
    `).join('');
}

// ===== FILTROS =====
function filtrarPorDisciplina(d) {
    document.getElementById('busca_geral').value = d;
    filtrarTabela();
}

function limparFiltro() {
    document.getElementById('busca_geral').value = '';
    filtrarTabela();
}
</script>

</body>
</html>
